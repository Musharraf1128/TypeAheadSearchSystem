version: '3.8'

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: typeahead-redis-1
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis1-data:/data

  redis-node-2:
    image: redis:7-alpine
    container_name: typeahead-redis-2
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis2-data:/data

  redis-node-3:
    image: redis:7-alpine
    container_name: typeahead-redis-3
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis3-data:/data

volumes:
  redis1-data:
  redis2-data:
  redis3-data:
